<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FarmaWeb — Vamos começar</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --verde-escuro: #0a4a3a;
      --verde-medio: #176b54;
      --verde-claro: #2aad84;
      --verde-menta: #d4f5ec;
      --branco: #f9fdf9;
      --cinza-suave: #e8f0ee;
      --cinza-texto: #3a4a47;
      --cinza-leve: #7a9490;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: var(--cinza-suave);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--verde-escuro), var(--verde-claro));
      z-index: 100;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(10, 74, 58, 0.10);
      padding: 52px 56px;
      width: 100%;
      max-width: 660px;
    }

    .topo-card {
      text-align: center;
      margin-bottom: 36px;
    }

    .topo-card .logo-icone {
      font-size: 44px;
      display: block;
      margin-bottom: 10px;
    }

    .topo-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      color: var(--verde-escuro);
    }

    .topo-card p {
      font-size: 0.9rem;
      color: var(--cinza-leve);
      margin-top: 5px;
    }

    
    .secao {
      margin-bottom: 28px;
    }

    .secao-titulo {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--verde-claro);
      margin-bottom: 18px;
      padding-bottom: 8px;
      border-bottom: 1.5px solid var(--verde-menta);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .grid-1 { display: grid; gap: 18px; }

    .campo-grupo {
      display: flex;
      flex-direction: column;
    }

    .campo-grupo label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--cinza-texto);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .campo-grupo input,
    .campo-grupo select {
      padding: 12px 14px;
      border: 1.5px solid var(--cinza-suave);
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      color: var(--cinza-texto);
      background: var(--branco);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .campo-grupo input:focus,
    .campo-grupo select:focus {
      border-color: var(--verde-claro);
      box-shadow: 0 0 0 3px rgba(42,173,132,0.12);
    }

    .termos {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 18px 0 28px;
      font-size: 0.88rem;
      color: var(--cinza-leve);
    }

    .termos input[type="checkbox"] {
      accent-color: var(--verde-claro);
      margin-top: 3px;
      width: 16px; height: 16px;
      flex-shrink: 0;
    }

    .termos a { color: var(--verde-claro); text-decoration: none; }
    .termos a:hover { text-decoration: underline; }

    .acoes {
      display: flex;
      gap: 14px;
    }

    .btn-cadastrar {
      flex: 1;
      padding: 14px;
      background: linear-gradient(90deg, var(--verde-medio), var(--verde-claro));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-cadastrar:hover { opacity: 0.91; transform: translateY(-1px); }

    .btn-voltar {
      padding: 14px 24px;
      background: transparent;
      color: var(--cinza-leve);
      border: 1.5px solid var(--cinza-suave);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-voltar:hover { border-color: var(--verde-claro); color: var(--verde-claro); }

    .link-login {
      text-align: center;
      margin-top: 22px;
      font-size: 0.9rem;
      color: var(--cinza-leve);
    }

    .link-login a {
      color: var(--verde-claro);
      font-weight: 500;
      text-decoration: none;
    }

    .dica-amigavel {
      background: var(--verde-menta);
      border-radius: 12px;
      padding: 12px 16px;
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--verde-escuro);
      text-align: center;
    }

    @media (max-width: 600px) {
      .card { padding: 32px 20px; }
      .grid-2 { grid-template-columns: 1fr; }
      .campo-grupo.span-2 { grid-column: span 1; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="topo-card">
      <span class="logo-icone">💊</span>
      <h1>Criar sua conta</h1>
      <p>Vamos começar? Preencha os dados e faça parte da FarmaWeb</p>
    </div>



    <!-- DADOS PESSOAIS -->
    <div class="secao">
      <p class="secao-titulo">Dados Pessoais</p>
      <div class="grid-2">
        <div class="campo-grupo">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" placeholder="Seu primeiro nome"/>
        </div>
        <div class="campo-grupo">
          <label for="sobrenome">Sobrenome</label>
          <input type="text" id="sobrenome" name="sobrenome" placeholder="Seu sobrenome"/>
        </div>
        <div class="campo-grupo">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14"/>
        </div>
        <div class="campo-grupo">
          <label for="nascimento">Data de Nascimento</label>
          <input type="date" id="nascimento" name="nascimento"/>
        </div>
        <div class="campo-grupo">
          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999"/>
        </div>
        <div class="campo-grupo">
          <label for="tipo">Perfil na farmácia</label>
          <select id="tipo" name="tipo">
            <option value="">Selecione...</option>
            <option value="cliente">Cliente</option>
            <option value="atendente">Atendente</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
      </div>
    </div>

    <!-- DADOS DE ACESSO -->
    <div class="secao">
      <p class="secao-titulo">Dados de Acesso</p>
      <div class="grid-1">
        <div class="campo-grupo">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="voce@email.com"/>
        </div>
        <div class="grid-2">
          <div class="campo-grupo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Crie uma senha segura"/>
          </div>
          <div class="campo-grupo">
            <label for="confirmar-senha">Confirmar Senha</label>
            <input type="password" id="confirmar-senha" name="confirmar_senha" placeholder="Digite novamente"/>
          </div>
        </div>
      </div>
    </div>

    <label class="termos">
      <input type="checkbox" name="termos"/>
      Li e concordo com os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a> da FarmaWeb.
    </label>

    <div class="acoes">
      <button class="btn-voltar" type="button" onclick="window.location.href='login.html'">← Voltar</button>
      <button class="btn-cadastrar" type="button">Criar Conta</button>
    </div>

    <p class="link-login">Já tem conta? <a href="login.html">Entrar agora</a></p>

    <div class="dica-amigavel">
      💡 Dica: Use uma senha fácil de lembrar, mas difícil de adivinhar. Nós cuidamos dos seus dados com carinho!
    </div>
  </div>

</body>
</html>
